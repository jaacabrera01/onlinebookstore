name: Automated Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright browsers
      run: |
        playwright install
    
    - name: Install X11 dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
    
    - name: Run API Security Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_api_security.py -v --tb=short
      continue-on-error: true
    
    - name: Run Authorization Security Tests
      run: |
        xvfb-run -a pytest tests/test_authorization_security.py -v --tb=short
      continue-on-error: true
    
    - name: Run Payment Security Tests
      run: |
        xvfb-run -a pytest tests/test_payment_security.py -v --tb=short
      continue-on-error: true
    
    - name: Run Data Validation Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_data_validation.py -v --tb=short
      continue-on-error: true
    
    - name: Run Core Security Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_security_comprehensive.py -v --tb=short
      continue-on-error: true
    
    - name: Run Authentication Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_authentication.py -v --tb=short
      continue-on-error: true
    
    - name: Run Shopping Cart Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_shopping_cart.py -v --tb=short
      continue-on-error: true
    
    - name: Run Checkout Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_checkout.py -v --tb=short
      continue-on-error: true
    
    - name: Run Product Search Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_product_search.py -v --tb=short
      continue-on-error: true
    
    - name: Run API Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_api.py -v --tb=short
      continue-on-error: true
    
    - name: Run Visual Regression Tests
      env:
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      run: |
        xvfb-run -a pytest tests/test_visual_regression.py -v --tb=short
      continue-on-error: true
    
    - name: Generate Allure Report
      if: always()
      run: |
        npx allure generate allure-results --clean -o allure-report
      continue-on-error: true
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.python-version }}
        path: allure-results/
    
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.python-version }}
        path: allure-report/
