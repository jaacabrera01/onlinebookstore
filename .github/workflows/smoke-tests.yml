name: Smoke Tests (Quick Check)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright browsers
      run: |
        playwright install
    
    - name: Run critical API tests
      run: |
        pytest tests/test_api_security.py tests/test_authentication.py -v --tb=short
      continue-on-error: true
    
    - name: Run critical checkout tests
      run: |
        pytest tests/test_checkout.py tests/test_payment_security.py -v --tb=short
      continue-on-error: true
