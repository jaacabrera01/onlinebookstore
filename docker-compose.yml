version: '3.8'

services:
  tests:
    build: .
    container_name: bookcart-tests
    environment:
      - BASE_URL=https://bookcart.azurewebsites.net/
      - HEADLESS=true
      - BROWSERS=chromium,firefox,webkit
      - TIMEOUT=30000
    volumes:
      - ./allure-results:/app/allure-results
      - ./test-results:/app/test-results
      - ./logs:/app/logs
    command: pytest tests/ -v --alluredir=allure-results --tb=short

  allure:
    image: frankescobar/allure-docker-service
    container_name: bookcart-allure
    ports:
      - "4040:4040"
      - "4041:4041"
    volumes:
      - ./allure-results:/app/allure-results
      - ./allure-report:/app/default-reports
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=5
      - KEEP_HISTORY=1
    depends_on:
      - tests

volumes:
  allure-results:
  test-results:
  logs:
